<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="stylesheet" href="css/style.css">
  <title>Blog</title>
</head>
<body>

<!-- ── Navbar ──────────────────────────────────────────────────────────────── -->
<nav id="navbar" role="navigation" aria-label="Main navigation">
  <div class="nav-inner">
    <a href="index.html" class="nav-brand">
      <span data-config="name">Sweta Singh</span>
    </a>

    <button id="menu-toggle" aria-label="Toggle menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>

    <ul id="nav-menu">
      <li><a href="index.html#skills" class="nav-link">Skills</a></li>
      <li><a href="index.html#projects" class="nav-link">Work</a></li>
      <li><a href="index.html#experience" class="nav-link">Experience</a></li>
      <li><a href="index.html#contact" class="nav-link">Contact</a></li>
      <li><a href="blog.html" class="nav-link active">Blog</a></li>
    </ul>

    <div class="nav-actions">
      <button id="theme-toggle" class="theme-btn" aria-label="Toggle theme"></button>
    </div>
  </div>
</nav>

<!-- ── Blog Hero ────────────────────────────────────────────────────────────── -->
<div class="blog-hero">
  <div class="container">
    <span class="section-label">Writing</span>
    <h1 class="section-title">The Blog</h1>
    <p class="section-subtitle">Thoughts on textile heritage, content craft, and the stories woven into every thread.</p>

    <div class="blog-search-bar">
      <span>🔍</span>
      <input type="search" id="search-input" placeholder="Search articles…" aria-label="Search blog posts">
    </div>

    <div id="tag-filters" role="group" aria-label="Filter by tag"></div>
  </div>
</div>

<!-- ── Posts Grid ───────────────────────────────────────────────────────────── -->
<div class="container">
  <div id="posts-grid" role="list" aria-label="Blog posts"></div>
</div>

<!-- ── Footer ───────────────────────────────────────────────────────────────── -->
<footer>
  <div class="container">
    <div class="footer-inner">
      <p class="footer-copy">© 2026 <span data-config="name">Sweta Singh</span>. All rights reserved.</p>
      <div class="footer-links">
        <a href="index.html">Portfolio</a>
        <a href="mailto:singhsweta1137@gmail.com">Email</a>
      </div>
    </div>
  </div>
