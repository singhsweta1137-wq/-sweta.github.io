<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="">
  <meta property="og:type" content="article">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="stylesheet" href="css/style.css">
  <title>Post</title>
</head>
<body>

<!-- ── Navbar ──────────────────────────────────────────────────────────────── -->
<nav id="navbar" role="navigation" aria-label="Main navigation">
  <div class="nav-inner">
    <a href="index.html" class="nav-brand">
      <span data-config="name">Sweta Singh</span>
    </a>

    <button id="menu-toggle" aria-label="Toggle menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>

    <ul id="nav-menu">
      <li><a href="index.html#skills" class="nav-link">Skills</a></li>
      <li><a href="index.html#projects" class="nav-link">Work</a></li>
      <li><a href="index.html#experience" class="nav-link">Experience</a></li>
      <li><a href="index.html#contact" class="nav-link">Contact</a></li>
      <li><a href="blog.html" class="nav-link active">Blog</a></li>
    </ul>

    <div class="nav-actions">
      <button id="theme-toggle" class="theme-btn" aria-label="Toggle theme"></button>
    </div>
  </div>
</nav>

<!-- ── Post Content ─────────────────────────────────────────────────────────── -->
<div class="post-page-wrap">
  <header id="post-header" aria-label="Post header"></header>

  <article id="post-body" aria-label="Post content">
    <div class="loading-state" style="text-align:center;padding:4rem 0;color:var(--text-3);">Loading post…</div>
  </article>

  <div class="share-section" id="share-buttons" aria-label="Share options"></div>

  <nav class="post-nav-section" id="post-nav" aria-label="Post navigation"></nav>
</div>

<!-- ── Footer ───────────────────────────────────────────────────────────────── -->
<footer>
  <div class="container">
    <div class="footer-inner">
      <p class="footer-copy">© 2026 <span data-config="name">Sweta Singh</span>. All rights reserved.</p>
      <div class="footer-links">
        <a href="index.html">Portfolio</a>
        <a href="blog.html">Blog</a>
      </div>
    </div>
  </div>
</footer>

<script src="js/config.js"></script>
<script src="js/md-parser.js"></script>
<script src="js/post-page.js"></script>
</body>
</html>
